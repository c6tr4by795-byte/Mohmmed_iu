<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسح رمز QR - العراق الأخضر V2</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="qr.css">
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 0 8.5C17 15 14.98 20 11 20z"></path><path d="M12 22v-2"></path></svg>
                <span>العراق الأخضر <span class="version">V2</span></span>
            </div>
            <nav class="sidebar-menu">
                <a href="home.html" class="menu-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>الرئيسية</span>
                </a>
                <a href="plant.html" class="menu-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V8M5 12l7-7 7 7"></path><circle cx="12" cy="5" r="1"></circle></svg>
                    <span>غرس شجرة</span>
                </a>
                <a href="map.html" class="menu-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                    <span>خريطة التشجير</span>
                </a>
                <a href="qr.html" class="menu-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                    <span>مسح رمز QR</span>
                </a>
                <a href="profile.html" class="menu-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>الملف الشخصي</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="welcome-user">
                    <h1>ماسح رمز QR الذكي</h1>
                    <p class="current-date">وجه كاميرا هاتفك نحو الرمز المطبوع على الشجرة للوصول إلى سجل التتبع والمراقبة</p>
                </div>
            </header>

            <div class="scanner-layout-container">
                <div class="scanner-card">
                    
                    <div class="camera-viewport-mock" id="cameraViewport">
                        
                        <div class="scanner-target-corner top-right"></div>
                        <div class="scanner-target-corner top-left"></div>
                        <div class="scanner-target-corner bottom-right"></div>
                        <div class="scanner-target-corner bottom-left"></div>
                        
                        <div class="scanner-laser-line"></div>
                        
                        <div class="scanner-hint-overlay">ضع رمز الـ QR داخل الإطار</div>
                    </div>

                    <div class="scanner-controls">
                        <button class="btn-scanner-action" id="btnToggleCamera">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                            <span id="cameraBtnText">تشغيل كاميرا الفحص</span>
                        </button>
                        
                        <div class="scanner-status-text" id="scannerStatus">الكاميرا في وضع الاستعداد...</div>
                    </div>

                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="bottom-nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>الرئيسية</span>
            </a>
            <a href="plant.html" class="bottom-nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V8M5 12l7-7 7 7"></path><circle cx="12" cy="5" r="1"></circle></svg>
                <span>غرس</span>
            </a>
            <a href="map.html" class="bottom-nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg>
                <span>الخريطة</span>
            </a>
            <a href="qr.html" class="bottom-nav-item active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>
                <span>مسح QR</span>
            </a>
            <a href="profile.html" class="bottom-nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>الملف</span>
            </a>
        </nav>

    </div>

    <script src="qr.js"></script>
</body>
</html>
