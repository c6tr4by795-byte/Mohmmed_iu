<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - IRAQ GREEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#E8F5E9 0%,#F8FAFC 40%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .c{background:white;border-radius:28px;padding:40px 28px;width:100%;max-width:420px;box-shadow:0 18px 40px rgba(0,0,0,.12);text-align:center}
        .lo{font-size:64px;margin-bottom:8px}
        .ti{font-size:24px;font-weight:800;color:#1B5E20;margin-bottom:4px}
        .su{font-size:14px;color:#6B7280;margin-bottom:32px}
        .fg{margin-bottom:20px;text-align:right}
        .fg label{display:block;font-size:14px;font-weight:600;color:#111827;margin-bottom:8px}
        .iw{position:relative}
        .iw span{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#6B7280;font-size:22px}
        .fg input{width:100%;padding:14px 48px 14px 16px;border:2px solid #E5E7EB;border-radius:16px;font-family:'Cairo',sans-serif;font-size:15px;background:#F8FAFC;color:#111827}
        .fg input:focus{outline:none;border-color:#2E7D32;background:white;box-shadow:0 0 0 4px rgba(46,125,50,.08)}
        .fg input::placeholder{color:#9CA3AF}
        .fp{text-align:left;margin-bottom:24px}
        .fp a{color:#2E7D32;font-size:13px;font-weight:600;text-decoration:none}
        .btn{width:100%;padding:16px;background:#2E7D32;color:white;border:none;border-radius:16px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:24px}
        .btn:hover{background:#1B5E20}
        .di{display:flex;align-items:center;gap:16px;margin-bottom:24px;color:#9CA3AF;font-size:13px}
        .di::before,.di::after{content:"";flex:1;height:1px;background:#E5E7EB}
        .sb{display:flex;gap:12px;margin-bottom:24px}
        .bs{flex:1;padding:12px;border:2px solid #E5E7EB;border-radius:16px;background:white;cursor:pointer;font-size:20px}
        .bs:hover{background:#F8FAFC;border-color:#2E7D32}
        .sl{font-size:14px;color:#6B7280}
        .sl a{color:#2E7D32;font-weight:700;text-decoration:none}
        .bl{display:inline-flex;align-items:center;gap:4px;color:#2E7D32;font-size:14px;font-weight:600;text-decoration:none;margin-bottom:24px}
        .er{background:#FEE2E2;color:#EF4444;padding:10px 16px;border-radius:12px;font-size:13px;margin-bottom:16px;display:none}
        @media(max-width:400px){.c{padding:28px 18px}}
        @media(prefers-color-scheme:dark){body{background:linear-gradient(180deg,#1a2e1a 0%,#111827 40%)}.c{background:#1F2937}.ti{color:#4ade80}.su{color:#9CA3AF}.fg label{color:#F9FAFB}.fg input{background:#374151;border-color:#4B5563;color:#F9FAFB}.bs{background:#374151;border-color:#4B5563}}
    </style>
</head>
<body>
    <div class="c">
        <div class="lo">🌳</div>
        <h1 class="ti">أهلاً بعودتك</h1>
        <p class="su">سجل دخولك إلى IRAQ GREEN</p>
        <div class="er" id="er">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>
        <form id="fm">
            <div class="fg">
                <label>البريد الإلكتروني</label>
                <div class="iw">
                    <span class="material-symbols-rounded">mail</span>
                    <input type="email" id="em" placeholder="example@email.com" required>
                </div>
            </div>
            <div class="fg">
                <label>كلمة المرور</label>
                <div class="iw">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="pw" placeholder="أدخل كلمة المرور" required minlength="6">
                </div>
            </div>
            <div class="fp">
                <a href="#">نسيت كلمة المرور؟</a>
            </div>
            <button type="submit" class="btn">تسجيل الدخول</button>
        </form>
        <div class="di">أو سجل دخولك عبر</div>
        <div class="sb">
            <button class="bs">G</button>
            <button class="bs">f</button>
            <button class="bs">A</button>
        </div>
        <p class="sl">ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
        <br>
        <a href="index.html" class="bl">
            <span class="material-symbols-rounded" style="font-size:18px">arrow_back</span>
            العودة للصفحة الرئيسية
        </a>
    </div>
    <script>
        document.getElementById('fm').addEventListener('submit',function(e){
            e.preventDefault();
            if(document.getElementById('em').value&&document.getElementById('pw').value.length>=6){
                window.location.href='index.html';
            }else{
                document.getElementById('er').style.display='block';
            }
        });
    </script>
</body>
</html>
