<head>

<meta charset="UTF-8">

</head>

<body>

<header>

<div class="top">

<h2>🌱 ازرع شجرة</h2>

<a href="index.html" class="back-btn">
رجوع
</a>

</div>

</header>




<main>

<div class="card">

<div class="content">

<h3>📷 صورة الشجرة</h3>

<button>إضافة صورة</button>

</div>

</div>

<div class="card">

<div class="content">

<h3>📍 الموقع</h3>

<button>تحديد موقعي</button>

</div>

</div>

<div class="card">

<div class="content">





<select class="search" name="tree_type" required>

<option value="" selected disabled>اختر نوع الشجرة</option>

<option value="sidr">🌳 سدر</option>

<option value="neem">🌿 نيم</option>

<option value="jacaranda">🌸 جاكرندا</option>

<option value="palm">🌴 نخلة</option>

<option value="olive">🫒 زيتون</option>

<option value="eucalyptus">🌲 كافور (أوكالبتوس)</option>

<option value="tecoma">🌼 تيكوما</option>

<option value="conocarpus">🌳 كونوكاربس</option>

<option value="other">🌱 أخرى</option>


<div class="card">

<div class="content">



  
  <h3>🎯 هدف الزراعة</h3>

<select class="search" name="purpose">

<option selected disabled>اختر الهدف</option>

<option>🌳 تشجير الشوارع</option>

<option>🏡 المنزل</option>

<option>🏫 مدرسة</option>

<option>🕌 مسجد</option>

<option>🌿 حديقة</option>

<option>🏢 جهة حكومية</option>

<option>🌱 أخرى</option>

</select>

</div>

</div>
  

  

</select>

</select>

</div>

</div>

<div class="card">

<div class="content">

<h3>📝 ملاحظات</h3>

<textarea
class="search"
style="height:120px;padding-top:15px;"
placeholder="اكتب أي ملاحظات..."></textarea>

</div>

</div>

<button
style="width:90%;margin:20px auto;display:block;">
تسجيل الشجرة
</button>

</main>
