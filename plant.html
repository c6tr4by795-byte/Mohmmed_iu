<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ازرع شجرة</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="top">

<h2>🌱 ازرع شجرة</h2>

<a href="index.html" class="back-btn">
رجوع
</a>

</div>

</header>

<main>

<div class="card">

<div class="content">

<h3>📷 صورة الشجرة</h3>

<button>إضافة صورة</button>

</div>

</div>

<div class="card">

<div class="content">

<h3>📍 الموقع</h3>

</div>

</div>

<div class="content">

<option>محمد</option>

<option>زيتون</option>

<option>سدر</option>

</select>

</div>

</div>

<div class="card">

<div class="content">

<h3>📝 ملاحظات</h3>

<textarea
class="search"
style="height:120px;padding-top:15px;"
placeholder="اكتب أي ملاحظات..."></textarea>

</div>

</div>

<button
style="width:90%;margin:20px auto;display:block;">
تسجيل الشجرة
</button>

</main>

</html>
