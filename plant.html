<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ازرع شجرة</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>رو ازرع شجرة</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class=.top{
position:relative;
display:flex;
justify-content:center;
align-items:center;
height:70px;
margin-bottom:20px;
}

.top h2{
font-size:34px;
font-weight:800;
color:#fff;
margin:0;
}

.back-btn{
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:52px;
height:52px;
border-radius:50%;
background:rgba(255,255,255,.18);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
text-decoration:none;
font-size:22px;
backdrop-filter:blur(10px);
transition:.3s;
}

.back-btn:hover{
background:#fff;
color:#18a058;
}

<a href="index.html" class="back-btn">
<i class="fa-solid fa-arrow-right"></i>
</a>

<h2>🌱  ازرع شجرة  </h2>

<div></div>

</div>

</header>


<main>

<div class="card">

<div class="content">

<h3>📷 صورة الشجرة</h3>

<button>إضافة صورة</button>

</div>

</div>

<div class="card">

<div class="content">

<h3>📍 الموقع</h3>

<button>تحديد موقعي</button>

</div>

</div>

<div class="card">

<div class="content">

<select class="search" name="tree_type" required>

<option value="" selected disabled>اختر نوع الشجرة</option>

<option value="sidr">🌳 سدر</option>

<option value="neem">🌿 نيم</option>

<option value="jacaranda">🌸 جاكرندا</option>

<option value="palm">🌴 نخلة</option>

<option value="olive">🫒 زيتون</option>

<option value="eucalyptus">🌲 كافور (أوكالبتوس)</option>

<option value="tecoma">🌼 تيكوما</option>

<option value="conocarpus">🌳 كونوكاربس</option>

<option value="other">🌱 أخرى</option>
<div class="card">

<div class="content">

  
<h3>📅 تاريخ الزراعة</h3>

<input
type="date"
class="search"
id="plantDate">

</div>

</div>

<div class="card">

<div class="content">

  <h3>🎯 هدف الزراعة</h3>

<select class="search" name="purpose">

<option selected disabled>اختر الهدف</option>

<option>🌳 تشجير الشوارع</option>

<option>🏡 المنزل</option>

<option>🏫 مدرسة</option>

<option>🕌 مسجد</option>

<option>🌿 حديقة</option>

<option>🏢 جهة حكومية</option>

<option>🌱 أخرى</option>

</select>

</div>

</div>
  

  

</select>

</select>

</div>

</div>

<div class="card">

<div class="content">

<h3>📝 ملاحظات</h3>

<textarea
class="search"
style="height:120px;padding-top:15px;"
placeholder="اكتب أي ملاحظات..."></textarea>

</div>

</div>

<button
style="width:90%;margin:20px auto;display:block;">
تسجيل الشجرة
</button>

</main>

</body>

</html>
