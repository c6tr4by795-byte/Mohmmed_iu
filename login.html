<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العراق الأخضر - تسجيل الدخول</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-wrapper">
        
        <main class="login-card" id="loginCard">
            
            <header class="login-header">
                <div class="login-logo" id="appLogo">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 15C32 35 32 65 50 85C68 65 68 35 50 15Z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M50 35C42 45 42 60 50 70" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M50 50C58 55 58 65 50 70" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M50 85V92" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 class="login-title">العراق الأخضر</h1>
                <p class="login-subtitle">مرحباً بك مجدداً، دعنا نواصل مسيرة التشجير</p>
            </header>

            <div class="feedback-message" id="authFeedback" aria-live="polite"></div>

            <form class="login-form" id="authForm" novalidate>
                
                <div class="input-group">
                    <label for="fullName" class="input-label">الاسم الكامل</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" class="form-input" placeholder="أدخل اسمك الثلاثي" required>
                        <span class="input-icon" aria-hidden="true">👤</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="userEmail" class="input-label">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <input type="email" id="userEmail" class="form-input" placeholder="example@domain.com" dir="ltr" required>
                        <span class="input-icon" aria-hidden="true">✉️</span>
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="userPassword" class="input-label">كلمة المرور</label>
                        <a href="#" id="linkForgotPassword" class="forgot-password-link">نسيت كلمة المرور؟</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="userPassword" class="form-input" placeholder="••••••••" required>
                        <span class="input-icon" aria-hidden="true">🔒</span>
                    </div>
                </div>

                <div class="actions-group">
                    <button type="submit" id="btnLogin" class="btn btn-primary">تسجيل الدخول</button>
                    <button type="button" id="btnCreateAccount" class="btn btn-secondary">إنشاء حساب جديد</button>
                </div>

            </form>

        </main>
        
    </div>

    <script src="app.js"></script>
    <script src="login.js"></script>
</body>
</html>
