<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الهوية الرقمية للشجرة - العراق الأخضر V2</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="qr-generated.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 0 8.5C17 15 14.98 20 11 20z"></path><path d="M12 22v-2"></path></svg>
                <span>العراق الأخضر <span class="version">V2</span></span>
            </div>
            <nav class="sidebar-menu">
                <a href="home.html" class="menu-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg> <span>الرئيسية</span></a>
                <a href="plant.html" class="menu-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22V8M5 12l7-7 7 7"></path></svg> <span>غرس شجرة</span></a>
                <a href="map.html" class="menu-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon></svg> <span>الخريطة</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="qr-result-card">
                <div class="success-header">
                    <div class="check-icon">✓</div>
                    <h2>تم توثيق الشجرة بنجاح!</h2>
                    <p>هذه هي هويتك الرقمية البيئية الفريدة</p>
                </div>

                <div class="digital-badge">
                    <div class="badge-content">
                        <h3 id="treeTypeDisplay">نوع الشجرة</h3>
                        <p id="treeCoordsDisplay">الإحداثيات الجغرافية</p>
                        <div class="qr-placeholder-box">
                            <div class="qr-pattern"></div>
                        </div>
                        <span class="tree-id-serial">Serial: IG-2026-X88</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button onclick="window.print()" class="btn-print">حفظ الهوية (PDF)</button>
                    <a href="home.html" class="btn-back">العودة للرئيسية</a>
                </div>
            </div>
        </main>
    </div>

    <script src="qr-generated.js"></script>
</body>
</html>
