<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - IRAQ GREEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(180deg, #E8F5E9 0%, #F8FAFC 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 28px;
            padding: 36px 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
            text-align: center;
        }
        .register-logo { font-size: 56px; margin-bottom: 4px; }
        .register-title { font-size: 24px; font-weight: 800; color: #1B5E20; margin-bottom: 4px; }
        .register-subtitle { font-size: 14px; color: #6B7280; margin-bottom: 28px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; text-align: right; flex: 1; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #111827; margin-bottom: 6px; }
        .input-wrapper { position: relative; }
        .input-wrapper .material-symbols-rounded {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: #6B7280; font-size: 20px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 14px 44px 14px 14px;
            border: 2px solid #E5E7EB; border-radius: 16px;
            font-family: 'Cairo', sans-serif; font-size: 14px;
            background: #F8FAFC; transition: all 0.25s; color: #111827;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #2E7D32; background: white;
            box-shadow: 0 0 0 4px rgba(46,125,50,0.08);
        }
        .form-group input::placeholder { color: #9CA3AF; font-size: 13px; }
        .terms { display: flex; align-items: flex-start; gap: 8px; text-align: right; margin-bottom: 20px; font-size: 12px; color: #6B7280; }
        .terms input { width: 18px; height: 18px; margin-top: 2px; accent-color: #2E7D32; }
        .terms a { color: #2E7D32; font-weight: 600; text-decoration: none; }
        .btn-register {
            width: 100%; padding: 16px; background: #2E7D32; color: white;
            border: none; border-radius: 16px; font-family: 'Cairo', sans-serif;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all 0.25s; margin-bottom: 20px;
        }
        .btn-register:hover { background: #1B5E20; box-shadow: 0 12px 30px rgba(46,125,50,0.30); }
        .login-link { font-size: 14px; color: #6B7280; }
        .login-link a { color: #2E7D32; font-weight: 700; text-decoration: none; }
        .back-link { display: inline-flex; align-items: center; gap: 4px; color: #2E7D32; font-size: 14px; font-weight: 600; text-decoration: none; margin-bottom: 20px; }
        .error-message { background: #FEE2E2; color: #EF4444; padding: 10px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 16px; display: none; }
        @media (max-width: 400px) { .form-row { flex-direction: column; gap: 0; } .register-container { padding: 24px 16px; } }
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(180deg, #1a2e1a 0%, #111827 40%); }
            .register-container { background: #1F2937; }
            .register-title { color: #4ade80; }
            .register-subtitle { color: #9CA3AF; }
            .form-group label { color: #F9FAFB; }
            .form-group input, .form-group select { background: #374151; border-color: #4B5563; color: #F9FAFB; }
            .form-group input::placeholder { color: #6B7280; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-logo">🌱</div>
        <h1 class="register-title">انضم إلى IRAQ GREEN</h1>
        <p class="register-subtitle">أنشئ حسابك وابدأ رحلتك في زراعة الأشجار</p>
        <div class="error-message" id="errorMsg">يرجى ملء جميع الحقول المطلوبة</div>
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>الاسم الأول</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded">person</span>
                        <input type="text" id="firstName" placeholder="محمد" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>الاسم الأخير</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded">person</span>
                        <input type="text" id="lastName" placeholder="العلي" required>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">mail</span>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">call</span>
                    <input type="tel" id="phone" placeholder="07xxxxxxxxx" required>
                </div>
            </div>
            <div class="form-group">
                <label>المحافظة</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">location_on</span>
                    <select id="governorate" required>
                        <option value="">اختر المحافظة</option>
                        <option>بغداد</option><option>البصرة</option><option>نينوى</option>
                        <option>أربيل</option><option>النجف</option><option>كربلاء</option>
                        <option>دهوك</option><option>السليمانية</option><option>كركوك</option>
                        <option>ديالى</option><option>واسط</option><option>ميسان</option>
                        <option>ذي قار</option><option>المثنى</option><option>القادسية</option>
                        <option>بابل</option><option>الأنبار</option><option>صلاح الدين</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="password" placeholder="6 خانات على الأقل" required minlength="6">
                </div>
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required minlength="6">
                </div>
            </div>
            <div class="terms">
                <input type="checkbox" id="agreeTerms" required>
                <span>أوافق على <a href="#">شروط الاستخدام</a> و <a href="#">سياسة الخصوصية</a></span>
            </div>
            <button type="submit" class="btn-register">إنشاء حساب</button>
        </form>
        <p class="login-link">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        <br>
        <a href="index.html" class="back-link">
            <span class="material-symbols-rounded" style="font-size:18px;">arrow_back</span>
            العودة للصفحة الرئيسية
        </a>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            const errorMsg = document.getElementById('errorMsg');
            if (password !== confirmPassword) {
                errorMsg.textContent = 'كلمة المرور غير متطابقة';
                errorMsg.style.display = 'block';
                return;
            }
            if (!agreeTerms) {
                errorMsg.textContent = 'يرجى الموافقة على شروط الاستخدام';
                errorMsg.style.display = 'block';
                return;
            }
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
