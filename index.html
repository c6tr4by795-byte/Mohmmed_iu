<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>العراق الأخضر</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="top">

<div>
<h2>🌳 العراق الأخضر</h2>
<p>ازرع اليوم... ليعيش العراق أخضر غداً</p>
</div>

<div class="avatar">
👤
</div>

</div>

<input
type="text"
placeholder="ابحث عن شجرة أو منطقة..."
class="search">

</header>

<main>

<div class="card">

<div class="image tree"></div>

<div class="content">

<h3>🌱 ازرع شجرة</h3>

<p>
سجل شجرة جديدة وارفع صورة وموقعها.
</p>

<button>
ابدأ الآن
</button>

</div>

</div>

<div class="card">

<div class="image map"></div>

<div class="content">

<h3>🗺️ خريطة الأشجار</h3>

<p>

استكشف جميع الأشجار المزروعة.

</p>

</div>

</div>

<div class="card">

<div class="image qr"></div>

<div class="content">

<h3>📷 QR Code</h3>

<p>

امسح رمز الشجرة للحصول على معلوماتها.

</p>

</div>

</div>

</main>

<nav>

<div>🏠</div>
<div>🌱</div>
<div>📷</div>
<div>🗺️</div>
<div>👤</div>

</nav>

<script src="app.js"></script>

</html>
