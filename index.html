<header class="hero">

<div class="hero-overlay"></div>

<div class="hero-content">

<div class="top-bar">

<div class="user-box">

<div class="avatar">

<i class="fa-solid fa-user"></i>

</div>

</div>

<div class="logo">

<h1>العراق الأخضر</h1>

<p>

ازرع اليوم...

ليعيش العراق أخضر غداً

</p>

</div>

</div>

<div class="search">

<i class="fa-solid fa-magnifying-glass"></i>

<main>

<section class="cards">

</h2>

</p>

<a
href="plant.html"
class="btn">

ابدأ الآن

</a>

</div>

</div>
<div class="card">

<div class="card-image map-image">

</div>

<div class="card-body">

<h2>

🗺️ خريطة الأشجار

</h2>

<p>

شاهد أماكن الأشجار
المزروعة في جميع
المحافظات.

</p>

<a
href="map.html"
class="btn secondary">

فتح الخريطة

</a>

</div>

</div>

<div class="card">

<div class="card-image profile-image">

</div>

<div class="card-body">

<h2>

👤 حسابي

</h2>

<p>

اعرض عدد الأشجار
والإنجازات الخاصة بك.

</p>

<a
href="profile.html"
class="btn dark">

</a>

</div>
