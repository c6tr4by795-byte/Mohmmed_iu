<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>العراق الأخضر</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(160deg,#0f5132,#198754);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{

width:90%;
max-width:380px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
padding:35px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.logo{

font-size:70px;

}

h1{

margin-top:10px;
font-size:32px;

}

p{

margin-top:15px;
opacity:.9;
line-height:1.7;

}

button{

margin-top:35px;
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:#198754;
font-size:20px;
font-weight:bold;
cursor:pointer;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">🌳</div>

<h1>العراق الأخضر</h1>

<p>

ازرع اليوم...
ليعيش العراق أخضر غداً

</p>

<button>

ابدأ الآن

</button>

</div>

</body>

</html>
